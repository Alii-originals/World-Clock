<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Clock</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>
:root{
--bg1:#6f8faa;
--bg2:#8fb3c9;
--card:#ffffff;
--text:#0b1a2b;
--muted:#6b7a90;
--border:#dbeafe;
--track:#e5e7eb;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:Inter,system-ui;
background:linear-gradient(135deg,var(--bg1),var(--bg2));
display:flex;
justify-content:center;
padding:20px;
color:var(--text);
}

.app{width:100%;max-width:1100px}

header{
text-align:center;
margin-bottom:16px;
}

.title{
font-family:'Pacifico',cursive;
font-size:36px;
color:white;
margin-bottom:10px;
}

.header-box{
background:rgba(255,255,255,0.9);
padding:14px;
border-radius:14px;
border:1px solid var(--border);
}

.date-line{
color:var(--muted);
font-size:14px;
margin-bottom:4px;
}

.main-clock{
font-size:30px;
font-weight:700;
}

.subline{
font-size:13px;
color:var(--muted);
}

.controls{
display:flex;
gap:10px;
background:white;
padding:10px;
border-radius:12px;
border:1px solid var(--border);
margin-bottom:12px;
}

input{
flex:1;
padding:10px;
border-radius:8px;
border:1px solid var(--border);
}

button{
padding:10px 14px;
background:#0b1a2b;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:12px;
}

.clock-card{
background:white;
padding:12px;
border-radius:12px;
border:1px solid var(--border);
text-align:center;
}

.city{font-weight:700;font-size:16px}
.country{font-size:12px;color:var(--muted)}

.time{
width:130px;
height:130px;
margin:10px auto;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
position:relative;
font-weight:600;
background:white;
}

.time::before{
content:"";
position:absolute;
inset:0;
border-radius:50%;
background:conic-gradient(#000 var(--angle), var(--track) var(--angle));
}

.time::after{
content:"";
position:absolute;
inset:12px;
border-radius:50%;
background:white;
}

.time span{
position:relative;
z-index:2;
}

.date{
font-size:12px;
color:var(--muted);
margin-top:6px;
}
</style>
</head>

<body>
<div class="app">

<header>
<div class="title">World Clock</div>

<div class="header-box">
<div id="localDate" class="date-line"></div>
<div id="mainClock" class="main-clock"></div>
<div id="deviceLine" class="subline"></div>
</div>
</header>

<div class="controls">
<input id="input" placeholder="Type country or city (e.g. KSA or Jeddah)">
<button onclick="addClock()">Add Clock</button>
</div>

<div id="grid" class="grid"></div>

</div>

<script>

const STORAGE="clocks_final";

/* COUNTRY SHORT FORMS */
const countryMap={
"ksa":{c:"Saudi Arabia",city:"Riyadh",z:"Asia/Riyadh"},
"saudi arabia":{c:"Saudi Arabia",city:"Riyadh",z:"Asia/Riyadh"},
"uae":{c:"UAE",city:"Abu Dhabi",z:"Asia/Dubai"},
"united arab emirates":{c:"UAE",city:"Abu Dhabi",z:"Asia/Dubai"},
"usa":{c:"USA",city:"Washington",z:"America/New_York"},
"uk":{c:"UK",city:"London",z:"Europe/London"},
"india":{c:"India",city:"New Delhi",z:"Asia/Kolkata"}
};

/* CITY FALLBACK */
const cityDB={
"manchester":"Europe/London",
"birmingham":"Europe/London",
"jeddah":"Asia/Riyadh",
"dubai":"Asia/Dubai",
"mumbai":"Asia/Kolkata",
"delhi":"Asia/Kolkata",
"new york":"America/New_York",
"los angeles":"America/Los_Angeles",
"chicago":"America/Chicago"
};

const zones=Intl.supportedValuesOf("timeZone");
let clocks=JSON.parse(localStorage.getItem(STORAGE)||"[]");

function norm(v){return v.toLowerCase().trim();}

function cityFromZone(z){
return z.split("/").pop().replaceAll("_"," ");
}

function find(val){
const t=norm(val);

if(countryMap[t]) return countryMap[t];

if(cityDB[t]) return {city:val,c:"",z:cityDB[t]};

const zone=zones.find(z=>cityFromZone(z).toLowerCase().includes(t));

if(zone) return {city:cityFromZone(zone),c:"",z:zone};

return null;
}

function addClock(){
const val=document.getElementById("input").value;
const res=find(val);

if(!res){alert("Not found");return;}

if(clocks.some(c=>c.z===res.z)) return;

clocks.push(res);
localStorage.setItem(STORAGE,JSON.stringify(clocks));
render();
}

function render(){
const grid=document.getElementById("grid");
grid.innerHTML="";

clocks.forEach(c=>{
const el=document.createElement("div");
el.className="clock-card";

el.innerHTML=`
<div class="city">${c.city}</div>
<div class="country">${c.c}</div>
<div class="time" data-zone="${c.z}"><span>00:00:00</span></div>
<div class="date" data-date="${c.z}"></div>
`;

grid.appendChild(el);
});
}

function tick(){
const now=new Date();

document.getElementById("mainClock").textContent=
new Intl.DateTimeFormat("en-GB",{hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false}).format(now);

document.getElementById("localDate").textContent=
new Intl.DateTimeFormat("en-GB",{weekday:"long",day:"2-digit",month:"long",year:"numeric"}).format(now);

const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
document.getElementById("deviceLine").textContent=tz;

document.querySelectorAll("[data-zone]").forEach(el=>{
const z=el.dataset.zone;

const time=new Intl.DateTimeFormat("en-GB",{
timeZone:z,hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false
}).format(now);

const parts=new Intl.DateTimeFormat("en-GB",{timeZone:z,hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false}).formatToParts(now);

const h=+parts.find(p=>p.type==="hour").value;
const m=+parts.find(p=>p.type==="minute").value;
const s=+parts.find(p=>p.type==="second").value;

const angle=((h*3600+m*60+s)/86400)*360;

el.style.setProperty("--angle", angle+"deg");
el.querySelector("span").textContent=time;
});

document.querySelectorAll("[data-date]").forEach(el=>{
el.textContent=new Intl.DateTimeFormat("en-GB",{
timeZone:el.dataset.date,
day:"2-digit",month:"short",year:"numeric"
}).format(now);
});
}

render();
setInterval(tick,1000);

</script>
</body>
</html>
