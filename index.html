<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Clock</title>
  <style>
    :root {
      --page-bg: #f4f4f4;
      --panel-bg: #ffffff;
      --card-bg: #f7f7f7;
      --text: #171717;
      --muted: #666666;
      --soft-muted: #9a9a9a;
      --border: #e5e5e5;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.08);
      --red: #d0121b;
      --red-soft: rgba(208, 18, 27, 0.12);
      --ring-bg: #e9e9e9;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.95), transparent 34%),
        radial-gradient(circle at 80% 10%, rgba(255, 255, 255, 0.9), transparent 30%),
        var(--page-bg);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      display: flex;
      justify-content: center;
      padding: 30px 16px 56px;
    }

    .app {
      width: min(1180px, 100%);
    }

    header {
      width: min(760px, 100%);
      margin: 0 auto 38px;
      padding: 28px 34px;
      text-align: center;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .date-line {
      color: var(--muted);
      font-size: clamp(18px, 2.2vw, 27px);
      font-weight: 400;
      letter-spacing: 0.2px;
      margin-bottom: 5px;
      text-transform: none;
    }

    .main-clock {
      color: var(--text);
      font-size: clamp(26px, 4vw, 42px);
      line-height: 1.2;
      font-weight: 800;
      letter-spacing: -0.5px;
      text-shadow: none;
      margin-top: 6px;
    }

    .main-clock span.dim {
      color: var(--text);
    }

    .subline {
      margin-top: 22px;
      color: var(--text);
      font-size: clamp(17px, 2vw, 25px);
      font-weight: 500;
      letter-spacing: 0.1px;
      text-transform: none;
    }

    .controls {
      width: min(760px, 100%);
      margin: 0 auto 16px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 18px;
      padding: 14px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    input, button {
      min-height: 48px;
      background: #ffffff;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      border-radius: 12px;
      padding: 12px 14px;
      outline: none;
      font-size: 15px;
    }

    input::placeholder {
      color: var(--soft-muted);
    }

    input:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 4px var(--red-soft);
    }

    button {
      cursor: pointer;
      transition: 0.2s ease;
      background: var(--text);
      color: #ffffff;
      font-weight: 700;
      white-space: nowrap;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
    }

    .message {
      min-height: 20px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      letter-spacing: 0.1px;
      margin-bottom: 34px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(245px, 1fr));
      gap: 28px;
      align-items: stretch;
    }

    .clock-card {
      min-height: 310px;
      background: transparent;
      border: 0;
      border-radius: 22px;
      padding: 0;
      position: relative;
      overflow: visible;
      cursor: grab;
    }

    .clock-card.dragging {
      opacity: 0.45;
    }

    .clock-card:active {
      cursor: grabbing;
    }

    .clock-card::before {
      display: none;
    }

    .city-row {
      min-height: 78px;
      display: flex;
      justify-content: center;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 12px;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .city-row > div:first-child {
      padding: 0 42px;
    }

    .city {
      color: var(--text);
      font-size: 20px;
      line-height: 1.25;
      font-weight: 600;
      letter-spacing: 0.1px;
      text-transform: none;
    }

    .country {
      color: var(--muted);
      font-size: 14px;
      margin-top: 4px;
      font-weight: 400;
      letter-spacing: 0;
    }

    .zone {
      display: none;
    }

    .city-row > div:last-child {
      position: absolute;
      top: 0;
      right: 0;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .drag-handle {
      width: 34px;
      height: 34px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.8);
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      border-radius: 50%;
      cursor: grab;
      user-select: none;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.06);
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    .delete-btn {
      min-height: 34px;
      height: 34px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.85);
      color: var(--red);
      padding: 0 10px;
      font-size: 11px;
      border-radius: 999px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.06);
    }

    .delete-btn:hover {
      color: #ffffff;
      background: var(--red);
      border-color: var(--red);
      transform: translateY(-1px);
    }

    .time {
      width: 220px;
      height: 220px;
      margin: 0 auto;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      font-size: clamp(30px, 4vw, 44px);
      font-weight: 400;
      letter-spacing: -1.5px;
      position: relative;
      z-index: 1;
      /* Pitch black ring with small gap */
      background:
        radial-gradient(circle, #ffffff 62%, transparent 63%),
        conic-gradient(#000000 0deg 345deg, transparent 345deg 360deg);
      box-shadow:
        0 10px 22px rgba(0, 0, 0, 0.08);
    }

    .time::after {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      border: 0;
      pointer-events: none;
    }

    .time::after {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      border: 2px solid rgba(230, 230, 230, 0.9);
      pointer-events: none;
    }

    .date {
      color: var(--muted);
      font-size: 14px;
      margin-top: 14px;
      letter-spacing: 0;
      text-align: center;
      text-transform: none;
      position: relative;
      z-index: 1;
    }

    .empty {
      display: none;
      width: min(760px, 100%);
      margin: 0 auto;
      border: 1px dashed var(--border);
      background: rgba(255, 255, 255, 0.7);
      border-radius: 18px;
      padding: 28px;
      text-align: center;
      color: var(--muted);
      letter-spacing: 0.1px;
      box-shadow: var(--shadow);
    }

    @media (max-width: 720px) {
      body {
        padding: 20px 12px 40px;
      }

      header {
        padding: 22px 18px;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .grid {
        gap: 34px;
      }

      .clock-card {
        min-height: 300px;
      }

      .time {
        width: 205px;
        height: 205px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div class="date-line" id="localDate">Loading</div>
      <div class="main-clock" id="mainClock">00<span class="dim">:</span>00<span class="dim">:</span>00</div>
      <div class="subline" id="deviceLine">LOCATION</div>
    </header>

    <section class="controls">
      <input id="countryInput" type="text" placeholder="Type any country, for example Saudi Arabia" autocomplete="off" />
      <button id="addBtn">Add Clock</button>
    </section>

    <div class="message" id="message">Loading all countries...</div>

    <section class="empty" id="emptyState">No clocks added yet.</section>
    <section class="grid" id="clockGrid"></section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/tz-lookup@6.1.25/tz.js"></script>

  <script>
    const STORAGE_KEY = "savedWorldClocks24h";

    const countryInput = document.getElementById("countryInput");
    const addBtn = document.getElementById("addBtn");
    const clockGrid = document.getElementById("clockGrid");
    const emptyState = document.getElementById("emptyState");
    const mainClock = document.getElementById("mainClock");
    const localDate = document.getElementById("localDate");
    const message = document.getElementById("message");
    const deviceLine = document.getElementById("deviceLine");
    let draggedIndex = null;

    const fallbackCountries = [
      { country: "Afghanistan", capital: "Kabul", zone: "Asia/Kabul" },
      { country: "Albania", capital: "Tirana", zone: "Europe/Tirane" },
      { country: "Algeria", capital: "Algiers", zone: "Africa/Algiers" },
      { country: "Argentina", capital: "Buenos Aires", zone: "America/Argentina/Buenos_Aires" },
      { country: "Australia", capital: "Canberra", zone: "Australia/Sydney" },
      { country: "Bangladesh", capital: "Dhaka", zone: "Asia/Dhaka" },
      { country: "Brazil", capital: "Brasília", zone: "America/Sao_Paulo" },
      { country: "Canada", capital: "Ottawa", zone: "America/Toronto" },
      { country: "China", capital: "Beijing", zone: "Asia/Shanghai" },
      { country: "Egypt", capital: "Cairo", zone: "Africa/Cairo" },
      { country: "France", capital: "Paris", zone: "Europe/Paris" },
      { country: "Germany", capital: "Berlin", zone: "Europe/Berlin" },
      { country: "India", capital: "New Delhi", zone: "Asia/Kolkata" },
      { country: "Indonesia", capital: "Jakarta", zone: "Asia/Jakarta" },
      { country: "Italy", capital: "Rome", zone: "Europe/Rome" },
      { country: "Japan", capital: "Tokyo", zone: "Asia/Tokyo" },
      { country: "Malaysia", capital: "Kuala Lumpur", zone: "Asia/Kuala_Lumpur" },
      { country: "Mexico", capital: "Mexico City", zone: "America/Mexico_City" },
      { country: "Nigeria", capital: "Abuja", zone: "Africa/Lagos" },
      { country: "Pakistan", capital: "Islamabad", zone: "Asia/Karachi" },
      { country: "Qatar", capital: "Doha", zone: "Asia/Qatar" },
      { country: "Russia", capital: "Moscow", zone: "Europe/Moscow" },
      { country: "Saudi Arabia", capital: "Riyadh", zone: "Asia/Riyadh" },
      { country: "Singapore", capital: "Singapore", zone: "Asia/Singapore" },
      { country: "South Africa", capital: "Pretoria", zone: "Africa/Johannesburg" },
      { country: "Spain", capital: "Madrid", zone: "Europe/Madrid" },
      { country: "Sri Lanka", capital: "Sri Jayawardenepura Kotte", zone: "Asia/Colombo" },
      { country: "Thailand", capital: "Bangkok", zone: "Asia/Bangkok" },
      { country: "Turkey", capital: "Ankara", zone: "Europe/Istanbul" },
      { country: "United Arab Emirates", capital: "Abu Dhabi", zone: "Asia/Dubai" },
      { country: "United Kingdom", capital: "London", zone: "Europe/London" },
      { country: "United States", capital: "Washington, D.C.", zone: "America/New_York" }
    ];

    let availableCountries = [];
    let clocks = loadClocks();

    function loadClocks() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return [];

      try {
        const parsed = JSON.parse(saved);
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveClocks() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(clocks));
    }

    async function loadCountries() {
      message.textContent = "Loading all countries...";

      try {
        const response = await fetch("https://restcountries.com/v3.1/all?fields=name,capital,capitalInfo,cca2,altSpellings");
        if (!response.ok) throw new Error("Could not load countries");

        const countries = await response.json();

        availableCountries = countries
          .map(country => {
            const capital = country.capital && country.capital[0] ? country.capital[0] : "No official capital";
            const latlng = country.capitalInfo && country.capitalInfo.latlng ? country.capitalInfo.latlng : null;

            if (!latlng || capital === "No official capital" || typeof tzlookup !== "function") return null;

            return {
              country: country.name.common,
              officialName: country.name.official,
              capital,
              zone: tzlookup(latlng[0], latlng[1]),
              code: country.cca2,
              altSpellings: country.altSpellings || []
            };
          })
          .filter(Boolean)
          .sort((a, b) => a.country.localeCompare(b.country));

        message.textContent = `${availableCountries.length} countries loaded. Type a country name and add its capital clock.`;
      } catch (error) {
        availableCountries = fallbackCountries;
        message.textContent = "Full country list could not load online, so a fallback list is active.";
      }
    }

    function normalise(value) {
      return String(value).trim().toLowerCase();
    }

    function findCountry(input) {
      const typed = normalise(input);
      if (!typed) return null;

      return availableCountries.find(item => {
        const names = [
          item.country,
          item.officialName,
          item.code,
          ...(item.altSpellings || [])
        ].filter(Boolean).map(normalise);

        return names.includes(typed);
      }) || availableCountries.find(item => normalise(item.country).startsWith(typed));
    }

    function formatTime(zone) {
      return new Intl.DateTimeFormat("en-GB", {
        timeZone: zone,
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      }).format(new Date());
    }

    function formatDate(zone) {
      return new Intl.DateTimeFormat("en-GB", {
        timeZone: zone,
        weekday: "short",
        day: "2-digit",
        month: "short",
        year: "numeric"
      }).format(new Date());
    }

    function renderCards() {
      clockGrid.innerHTML = "";
      emptyState.style.display = clocks.length ? "none" : "block";

      clocks.forEach((clock, index) => {
        const card = document.createElement("article");
        card.className = "clock-card";

        card.draggable = true;
        card.dataset.index = index;

        card.innerHTML = `
          <div class="city-row">
            <div>
              <div class="city">${escapeHTML(clock.capital)}</div>
              <div class="country">${escapeHTML(clock.country)}</div>
              <div class="zone">${escapeHTML(clock.zone)}</div>
            </div>
            <div>
              <button class="delete-btn" data-index="${index}">Delete</button>
            </div>
          </div>
          <div class="time" data-zone="${clock.zone}">00:00:00</div>
          <div class="date" data-date-zone="${clock.zone}">Loading</div>
        `;
        clockGrid.appendChild(card);
      });

      document.querySelectorAll(".delete-btn").forEach(button => {
        button.addEventListener("click", () => {
          const index = Number(button.dataset.index);
          clocks.splice(index, 1);
          saveClocks();
          renderCards();
          tick();
        });
      });

      document.querySelectorAll(".clock-card").forEach(card => {
        card.addEventListener("dragstart", () => {
          draggedIndex = Number(card.dataset.index);
          card.classList.add("dragging");
        });

        card.addEventListener("dragend", () => {
          card.classList.remove("dragging");
          draggedIndex = null;
        });

        card.addEventListener("dragover", event => {
          event.preventDefault();
        });

        card.addEventListener("drop", event => {
          event.preventDefault();
          const targetIndex = Number(card.dataset.index);
          moveClock(draggedIndex, targetIndex);
        });
      });
    }

    function moveClock(oldIndex, newIndex) {
      if (oldIndex === null || oldIndex === newIndex) return;

      const [clock] = clocks.splice(oldIndex, 1);
      clocks.splice(newIndex, 0, clock);
      saveClocks();
      renderCards();
      tick();
    }

    function tick() {
      const now = new Date();
      const localTime = new Intl.DateTimeFormat("en-GB", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      }).format(now);

      const [hh, mm, ss] = localTime.split(":");
      mainClock.innerHTML = `${hh}<span class="dim">:</span>${mm}<span class="dim">:</span>${ss}`;

      localDate.textContent = new Intl.DateTimeFormat("en-GB", {
        weekday: "long",
        day: "2-digit",
        month: "long",
        year: "numeric"
      }).format(now).toUpperCase();

      const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
      const city = tz.split("/").pop().replaceAll("_", " ");
      deviceLine.textContent = `${city.toUpperCase()} • ${tz.toUpperCase()}`;

      document.querySelectorAll("[data-zone]").forEach(el => {
        el.textContent = formatTime(el.dataset.zone);
      });

      document.querySelectorAll("[data-date-zone]").forEach(el => {
        el.textContent = formatDate(el.dataset.dateZone);
      });
    }

    function addClock() {
      const country = findCountry(countryInput.value);

      if (!country) {
        message.textContent = "Country not found. Type the country name correctly.";
        return;
      }

      const exists = clocks.some(clock => clock.country === country.country && clock.capital === country.capital);

      if (exists) {
        message.textContent = "This country clock is already added.";
        return;
      }

      clocks.push(country);
      saveClocks();
      countryInput.value = "";
      message.textContent = `${country.country} added. Capital city: ${country.capital}.`;
      renderCards();
      tick();
    }

    function escapeHTML(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    addBtn.addEventListener("click", addClock);
    countryInput.addEventListener("keydown", event => {
      if (event.key === "Enter") addClock();
    });

    loadCountries();
    renderCards();
    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
