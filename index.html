<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Clock</title>
  <style>
    :root {
      --page-bg: #f5f9ff;
      --panel-bg: #ffffff;
      --card-bg: #ffffff;
      --text: #0b1a2b;
      --muted: #6b7a90;
      --soft-muted: #9fb3c8;
      --border: #e3eefc;
      --shadow: 0 10px 25px rgba(0, 102, 204, 0.08);
      --blue: #2563eb;
      --blue-soft: rgba(37, 99, 235, 0.12);
      --ring-track: #e4eefb;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(219, 234, 254, 0.9), transparent 32%),
        radial-gradient(circle at top right, rgba(191, 219, 254, 0.55), transparent 34%),
        var(--page-bg);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      display: flex;
      justify-content: center;
      padding: 30px 16px 56px;
    }

    .app {
      width: min(1180px, 100%);
    }

    header {
      width: min(720px, 100%);
      margin: 0 auto 32px;
      padding: 22px 26px;
      text-align: center;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .date-line {
      color: var(--muted);
      font-size: clamp(18px, 2.2vw, 27px);
      font-weight: 400;
      letter-spacing: 0.2px;
      margin-bottom: 5px;
      text-transform: none;
    }

    .main-clock {
      color: var(--text);
      font-size: clamp(26px, 4vw, 42px);
      line-height: 1.2;
      font-weight: 800;
      letter-spacing: -0.5px;
      text-shadow: none;
      margin-top: 6px;
    }

    .main-clock span.dim {
      color: var(--text);
    }

    .subline {
      margin-top: 22px;
      color: var(--text);
      font-size: clamp(17px, 2vw, 25px);
      font-weight: 500;
      letter-spacing: 0.1px;
      text-transform: none;
    }

    .controls {
      width: min(720px, 100%);
      margin: 0 auto 16px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 12px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    input, button {
      min-height: 44px;
      background: #ffffff;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      border-radius: 12px;
      padding: 10px 12px;
      outline: none;
      font-size: 14px;
      -webkit-appearance: none;
    }

    input::selection {
      background: rgba(15, 23, 42, 0.12);
    }

    input::placeholder {
      color: var(--soft-muted);
    }

    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px var(--blue-soft);
    }

    button {
      cursor: pointer;
      transition: 0.2s ease;
      background: var(--text);
      color: #ffffff;
      font-weight: 700;
      white-space: nowrap;
      border: none;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 25px rgba(37, 99, 235, 0.18);
    }

    .message {
      min-height: 20px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      letter-spacing: 0.1px;
      margin-bottom: 34px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(245px, 1fr));
      gap: 28px;
      align-items: stretch;
    }

    .clock-card {
      min-height: 310px;
      background: transparent;
      border: 0;
      border-radius: 22px;
      padding: 0;
      position: relative;
      overflow: visible;
      cursor: grab;
    }

    .clock-card.dragging {
      opacity: 0.45;
    }

    .clock-card:active {
      cursor: grabbing;
    }

    .city-row {
      min-height: 78px;
      display: flex;
      justify-content: center;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 12px;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .city-row > div:first-child {
      padding: 0 42px;
    }

    .city {
      color: var(--text);
      font-size: 20px;
      line-height: 1.25;
      font-weight: 650;
      letter-spacing: 0.1px;
      text-transform: none;
    }

    .country {
      color: var(--muted);
      font-size: 14px;
      margin-top: 4px;
      font-weight: 400;
      letter-spacing: 0;
    }

    .zone {
      display: none;
    }

    .city-row > div:last-child {
      position: absolute;
      top: 0;
      right: 0;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .delete-btn {
      min-height: 34px;
      height: 34px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.92);
      color: var(--blue);
      padding: 0 10px;
      font-size: 11px;
      border-radius: 999px;
      box-shadow: 0 6px 16px rgba(37, 99, 235, 0.12);
    }

    .delete-btn:hover {
      color: #ffffff;
      background: var(--blue);
      border-color: var(--blue);
      transform: translateY(-1px);
    }

    .time {
      width: 200px;
      height: 200px;
      margin: 0 auto;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      font-size: clamp(28px, 4vw, 40px);
      font-weight: 500;
      position: relative;
      background: #ffffff;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
    }

    .time::after {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      border: 2px solid rgba(219, 234, 254, 0.95);
      pointer-events: none;
    }

    .date {
      color: var(--muted);
      font-size: 13px;
      margin-top: 12px;
      text-align: center;
    }

    .empty {
      display: none;
      width: min(760px, 100%);
      margin: 0 auto;
      border: 1px dashed var(--border);
      background: rgba(255, 255, 255, 0.72);
      border-radius: 18px;
      padding: 28px;
      text-align: center;
      color: var(--muted);
      letter-spacing: 0.1px;
      box-shadow: var(--shadow);
    }

    @media (max-width: 720px) {
      body {
        padding: 20px 12px 40px;
      }

      header {
        padding: 22px 18px;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .grid {
        gap: 34px;
      }

      .clock-card {
        min-height: 300px;
      }

      .time {
        width: 205px;
        height: 205px;
      }
    }
  </style>
</head>

      { country: "Trinidad and Tobago", capital: "Port of Spain", zone: "America/Port_of_Spain", aliases: ["tt"] },
      { country: "Tunisia", capital: "Tunis", zone: "Africa/Tunis", aliases: ["tn"] },
      { country: "Turkey", capital: "Ankara", zone: "Europe/Istanbul", aliases: ["turkiye", "türkiye", "tr"] },
      { country: "Turkmenistan", capital: "Ashgabat", zone: "Asia/Ashgabat", aliases: ["tm"] },
      { country: "Tuvalu", capital: "Funafuti", zone: "Pacific/Funafuti", aliases: ["tv"] },
      { country: "Uganda", capital: "Kampala", zone: "Africa/Kampala", aliases: ["ug"] },
      { country: "Ukraine", capital: "Kyiv", zone: "Europe/Kyiv", aliases: ["kiev", "ua"] },
      { country: "United Arab Emirates", capital: "Abu Dhabi", zone: "Asia/Dubai", aliases: ["uae", "ae"] },
      { country: "United Kingdom", capital: "London", zone: "Europe/London", aliases: ["uk", "great britain", "britain", "gb"] },
      { country: "United States", capital: "Washington, D.C.", zone: "America/New_York", aliases: ["usa", "us", "america", "united states of america"] },
      { country: "Uruguay", capital: "Montevideo", zone: "America/Montevideo", aliases: ["uy"] },
      { country: "Uzbekistan", capital: "Tashkent", zone: "Asia/Tashkent", aliases: ["uz"] },
      { country: "Vanuatu", capital: "Port Vila", zone: "Pacific/Efate", aliases: ["vu"] },
      { country: "Vatican City", capital: "Vatican City", zone: "Europe/Vatican", aliases: ["holy see", "va"] },
      { country: "Venezuela", capital: "Caracas", zone: "America/Caracas", aliases: ["ve"] },
      { country: "Vietnam", capital: "Hanoi", zone: "Asia/Ho_Chi_Minh", aliases: ["viet nam", "vn"] },
      { country: "Yemen", capital: "Sanaa", zone: "Asia/Aden", aliases: ["ye"] },
      { country: "Zambia", capital: "Lusaka", zone: "Africa/Lusaka", aliases: ["zm"] },
      { country: "Zimbabwe", capital: "Harare", zone: "Africa/Harare", aliases: ["zw"] }
    ];

    let availableCountries = [];
    let clocks = loadClocks();

    function loadClocks() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return [];

      try {
        const parsed = JSON.parse(saved);
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveClocks() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(clocks));
    }

    function loadCountries() {
      availableCountries = [...allCountries].sort((a, b) => a.country.localeCompare(b.country));
      message.textContent = `${availableCountries.length} countries loaded locally. Type a country name and add its capital clock.`;
    }

    function normalise(value) {
      return String(value)
        .trim()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[.’']/g, "")
        .replace(/\s+/g, " ");
    }

    function findCountry(input) {
      const typed = normalise(input);
      if (!typed) return null;

      return availableCountries.find(item => {
        const names = [item.country, item.capital, ...(item.aliases || [])].map(normalise);
        return names.includes(typed);
      }) || availableCountries.find(item => normalise(item.country).startsWith(typed));
    }

    function getProgressAngle(zone) {
      const now = new Date();
      const parts = new Intl.DateTimeFormat("en-GB", {
        timeZone: zone,
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      }).formatToParts(now);

      const h = Number(parts.find(part => part.type === "hour").value);
      const m = Number(parts.find(part => part.type === "minute").value);
      const s = Number(parts.find(part => part.type === "second").value);
      const totalSeconds = (h * 3600) + (m * 60) + s;

      return (totalSeconds / 86400) * 360;
    }

    function formatTime(zone) {
      return new Intl.DateTimeFormat("en-GB", {
        timeZone: zone,
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      }).format(new Date());
    }

    function formatDate(zone) {
      return new Intl.DateTimeFormat("en-GB", {
        timeZone: zone,
        weekday: "short",
        day: "2-digit",
        month: "short",
        year: "numeric"
      }).format(new Date());
    }

    function renderCards() {
      clockGrid.innerHTML = "";
      emptyState.style.display = clocks.length ? "none" : "block";

      clocks.forEach((clock, index) => {
        const card = document.createElement("article");
        card.className = "clock-card";
        card.draggable = true;
        card.dataset.index = index;

        card.innerHTML = `
          <div class="city-row">
            <div>
              <div class="city">${escapeHTML(clock.capital)}</div>
              <div class="country">${escapeHTML(clock.country)}</div>
              <div class="zone">${escapeHTML(clock.zone)}</div>
            </div>
            <div>
              <button class="delete-btn" data-index="${index}">Delete</button>
            </div>
          </div>
          <div class="time" data-zone="${clock.zone}">00:00:00</div>
          <div class="date" data-date-zone="${clock.zone}">Loading</div>
        `;

        clockGrid.appendChild(card);
      });

      document.querySelectorAll(".delete-btn").forEach(button => {
        button.addEventListener("click", () => {
          const index = Number(button.dataset.index);
          clocks.splice(index, 1);
          saveClocks();
          renderCards();
          tick();
        });
      });

      document.querySelectorAll(".clock-card").forEach(card => {
        card.addEventListener("dragstart", () => {
          draggedIndex = Number(card.dataset.index);
          card.classList.add("dragging");
        });

        card.addEventListener("dragend", () => {
          card.classList.remove("dragging");
          draggedIndex = null;
        });

        card.addEventListener("dragover", event => {
          event.preventDefault();
        });

        card.addEventListener("drop", event => {
          event.preventDefault();
          const targetIndex = Number(card.dataset.index);
          moveClock(draggedIndex, targetIndex);
        });
      });
    }

    function moveClock(oldIndex, newIndex) {
      if (oldIndex === null || oldIndex === newIndex) return;

      const [clock] = clocks.splice(oldIndex, 1);
      clocks.splice(newIndex, 0, clock);
      saveClocks();
      renderCards();
      tick();
    }

    function getDeviceLocationLabel() {
      const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || "Local Time";
      const city = tz.includes("/") ? tz.split("/").pop().replaceAll("_", " ") : tz;
      return `${city.toUpperCase()} • ${tz.toUpperCase()}`;
    }

    function tick() {
      const now = new Date();
      const localTime = new Intl.DateTimeFormat("en-GB", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      }).format(now);

      const [hh, mm, ss] = localTime.split(":");
      mainClock.innerHTML = `${hh}<span class="dim">:</span>${mm}<span class="dim">:</span>${ss}`;

      localDate.textContent = new Intl.DateTimeFormat("en-GB", {
        weekday: "long",
        day: "2-digit",
        month: "long",
        year: "numeric"
      }).format(now).toUpperCase();

      deviceLine.textContent = getDeviceLocationLabel();

      document.querySelectorAll("[data-zone]").forEach(el => {
        const zone = el.dataset.zone;
        const angle = getProgressAngle(zone);

        el.textContent = formatTime(zone);
        el.style.background = `
          radial-gradient(circle, #ffffff 62%, transparent 63%),
          conic-gradient(#000000 0deg ${angle}deg, var(--ring-track) ${angle}deg 360deg)
        `;
      });

      document.querySelectorAll("[data-date-zone]").forEach(el => {
        el.textContent = formatDate(el.dataset.dateZone);
      });
    }

    function addClock() {
      const country = findCountry(countryInput.value);

      if (!country) {
        message.textContent = "Country not found. Type the country name correctly.";
        return;
      }

      const exists = clocks.some(clock => clock.country === country.country && clock.capital === country.capital);

      if (exists) {
        message.textContent = "This country clock is already added.";
        return;
      }

      clocks.push(country);
      saveClocks();
      countryInput.value = "";
      message.textContent = `${country.country} added. Capital city: ${country.capital}.`;
      renderCards();
      tick();
    }

    function escapeHTML(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function runTests() {
      console.assert(Array.isArray(allCountries), "Countries list must be an array.");
      console.assert(allCountries.length === 195, `Expected 195 countries, found ${allCountries.length}.`);
      console.assert(new Set(allCountries.map(item => item.country)).size === allCountries.length, "Country names must be unique.");
      console.assert(allCountries.every(item => item.country && item.capital && item.zone), "Every country must have country, capital and zone.");
      console.assert(findCountry("Saudi Arabia")?.capital === "Riyadh", "Saudi Arabia should map to Riyadh.");
      console.assert(findCountry("KSA")?.capital === "Riyadh", "KSA alias should map to Riyadh.");
      console.assert(findCountry("United States")?.capital === "Washington, D.C.", "United States should map to Washington, D.C.");
      console.assert(findCountry("UK")?.capital === "London", "UK alias should map to London.");
      console.assert(findCountry("Czechia")?.capital === "Prague", "Czechia alias should map to Prague.");
    }

    addBtn.addEventListener("click", addClock);
    countryInput.addEventListener("keydown", event => {
      if (event.key === "Enter") addClock();
    });

    loadCountries();
    runTests();
    renderCards();
    tick();
    setInterval(tick, 1000);
  </script>
