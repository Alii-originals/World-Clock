<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f5f4f0" />
  <title>World Clock</title>

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="World Clock">
  <meta name="mobile-web-app-capable" content="yes">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f4f0;
      --surface: rgba(255, 255, 255, 0.78);
      --surface-strong: rgba(255, 255, 255, 0.92);
      --text: #050505;
      --muted: #66615c;
      --soft: #a8a39e;
      --border: rgba(8, 8, 8, 0.07);
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.10);
      --soft-shadow: 0 14px 36px rgba(0, 0, 0, 0.08);
      --black: #050505;
      --danger: #d73f49;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 14%, rgba(255,255,255,.95), transparent 28%),
        radial-gradient(circle at 82% 10%, rgba(255,255,255,.82), transparent 26%),
        linear-gradient(135deg, #f7f6f2 0%, #eeece7 48%, #f8f7f4 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      display: flex;
      justify-content: center;
      padding: 26px 18px 56px;
      overflow-x: hidden;
    }

    .app {
      width: min(1160px, 100%);
      position: relative;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    .brand-dot {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--black);
      color: #fff;
      font-size: 20px;
      box-shadow: 0 10px 28px rgba(0,0,0,.12);
      flex: 0 0 auto;
    }

    .top-note {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .title {
      font-family: "Times New Roman", Times, serif;
      color: var(--text);
      text-align: center;
      font-size: clamp(42px, 7.2vw, 88px);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: clamp(0.05em, 1vw, 0.16em);
      text-transform: uppercase;
      margin: 6px auto 28px;
      max-width: 100%;
      white-space: nowrap;
    }

    header {
      width: min(560px, 100%);
      margin: 0 auto 18px;
      padding: clamp(22px, 4vw, 34px);
      text-align: center;
      background: var(--surface-strong);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      overflow: hidden;
    }

    .hero-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      font-size: 13px;
      font-weight: 800;
    }

    .hero-label-left {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .status-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--black);
      position: relative;
      flex: 0 0 auto;
    }

    .status-dot::after {
      content: "";
      position: absolute;
      inset: 6px;
      border-radius: 50%;
      background: #fff;
    }

    .hero-pill,
    .utc-pill {
      border-radius: 999px;
      background: rgba(5,5,5,.06);
      color: var(--muted);
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
      white-space: nowrap;
    }

    .main-clock {
      font-size: clamp(52px, 9vw, 94px);
      font-weight: 900;
      letter-spacing: -0.08em;
      line-height: 0.95;
      white-space: nowrap;
      max-width: 100%;
    }

    .date-line {
      color: var(--text);
      font-size: clamp(15px, 2vw, 20px);
      font-weight: 850;
      margin-top: 16px;
    }

    .hero-rule {
      width: 72%;
      height: 1px;
      margin: 17px auto 15px;
      background: linear-gradient(90deg, transparent, rgba(0,0,0,.14), transparent);
    }

    .subline {
      color: var(--text);
      font-size: clamp(14px, 1.7vw, 17px);
      font-weight: 800;
      margin-top: 4px;
      overflow-wrap: anywhere;
    }

    .format-line {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      margin-top: 16px;
    }

    .controls {
      width: min(720px, 100%);
      margin: 0 auto 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 10px;
      background: var(--surface-strong);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--soft-shadow);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    input, button {
      min-height: 48px;
      border-radius: 17px;
      font-family: inherit;
      font-size: 15px;
      outline: none;
    }

    input {
      width: 100%;
      border: 0;
      background: rgba(255,255,255,.9);
      color: var(--text);
      padding: 12px 16px;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.06);
    }

    input::placeholder {
      color: #8b8782;
    }

    input:focus {
      box-shadow:
        inset 0 0 0 1px rgba(0,0,0,.14),
        0 0 0 5px rgba(0,0,0,.04);
    }

    button {
      border: 0;
      background: var(--black);
      color: #ffffff;
      padding: 0 18px;
      font-weight: 850;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
      white-space: nowrap;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 26px rgba(0, 0, 0, 0.15);
    }

    button:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .message {
      min-height: 24px;
      color: var(--muted);
      text-align: center;
      font-size: 14px;
      font-weight: 750;
      margin: 14px 0 12px;
    }

    .map-panel {
      width: min(980px, 100%);
      margin: 0 auto 24px;
      position: relative;
      border-radius: 26px;
      overflow: hidden;
      min-height: clamp(180px, 26vw, 310px);
      background: rgba(255,255,255,.28);
    }

    .world-map {
      width: 100%;
      height: 100%;
      min-height: inherit;
      display: block;
      opacity: .52;
      filter: grayscale(1);
    }

    .world-map .land {
      fill: #a9a7a2;
    }

    .world-map .line {
      stroke: rgba(215,63,73,.35);
      stroke-width: 1.1;
    }

    .world-map .dot-outer {
      fill: rgba(5,5,5,.76);
    }

    .world-map .dot-inner {
      fill: var(--danger);
    }

    .map-axis {
      position: absolute;
      left: 4%;
      right: 4%;
      bottom: 16px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      pointer-events: none;
    }

    .map-axis span:nth-child(5) {
      background: var(--black);
      color: #fff;
      border-radius: 999px;
      padding: 5px 10px;
      margin-top: -5px;
    }

    .map-baseline {
      position: absolute;
      left: 4%;
      right: 4%;
      bottom: 47px;
      height: 1px;
      background: rgba(0,0,0,.08);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
      align-items: stretch;
    }

    .clock-card {
      background: var(--surface-strong);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 18px;
      box-shadow: var(--soft-shadow);
      cursor: grab;
      min-height: 190px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
      overflow: hidden;
    }

    .clock-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 24px 46px rgba(0,0,0,.12);
      border-color: rgba(0,0,0,.12);
    }

    .clock-card.dragging {
      opacity: 0.45;
      transform: scale(.98);
    }

    .clock-card:active {
      cursor: grabbing;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 12px;
    }

    .city {
      font-size: 20px;
      font-weight: 900;
      line-height: 1.18;
      word-break: break-word;
    }

    .country {
      color: var(--muted);
      font-size: 14px;
      font-weight: 650;
      margin-top: 3px;
      text-transform: capitalize;
      word-break: break-word;
    }

    .day-status {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .time {
      margin: 0;
      display: block;
      font-size: clamp(34px, 4.2vw, 48px);
      font-weight: 850;
      color: inherit;
      line-height: 1;
      letter-spacing: -0.06em;
      white-space: nowrap;
    }

    .time span {
      display: block;
    }

    .date {
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
      margin-top: 10px;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      margin-top: 16px;
      overflow-wrap: anywhere;
    }

    .delete-btn {
      min-height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(5,5,5,.06);
      color: inherit;
      border: 1px solid rgba(0,0,0,.06);
      font-size: 12px;
      box-shadow: none;
    }

    .delete-btn:hover {
      background: var(--danger);
      color: #ffffff;
      box-shadow: none;
    }

    .empty {
      display: none;
      width: min(560px, 100%);
      margin: 0 auto;
      background: var(--surface-strong);
      border: 1px dashed rgba(0,0,0,.12);
      border-radius: 22px;
      padding: 26px;
      text-align: center;
      color: var(--muted);
      font-weight: 750;
      box-shadow: var(--soft-shadow);
    }



    .app-mark {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--black);
      color: #fff;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .06em;
      box-shadow: 0 10px 28px rgba(0,0,0,.12);
      flex: 0 0 auto;
    }

    .install-btn {
      min-height: 42px;
      border-radius: 999px;
      padding: 0 16px;
      font-size: 13px;
      font-weight: 850;
      background: var(--black);
      color: #fff;
    }

    .install-btn[hidden] {
      display: none;
    }

    .clock-card {
      background: var(--surface-strong);
      color: var(--text);
      animation: cardIn .28s ease both;
    }

    .clock-card .country,
    .clock-card .date,
    .clock-card .card-footer,
    .clock-card .day-status {
      color: var(--muted);
    }

    .clock-card .utc-pill {
      background: rgba(5,5,5,.06);
      color: var(--muted);
    }

    .clock-card .delete-btn {
      background: rgba(5,5,5,.06);
      color: var(--text);
      border: 1px solid rgba(0,0,0,.06);
    }

    .city-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .flag {
      font-size: 22px;
      line-height: 1;
      flex: 0 0 auto;
      filter: saturate(.9);
    }

    .flag:empty {
      display: none;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .world-map {
      opacity: .36;
    }

    .world-map .land {
      fill: #9d9993;
    }

    .world-map .graticule {
      fill: none;
      stroke: rgba(0,0,0,.06);
      stroke-width: .8;
    }

    .map-marker {
      fill: var(--danger);
      stroke: rgba(5,5,5,.72);
      stroke-width: 5;
      filter: drop-shadow(0 5px 10px rgba(0,0,0,.2));
    }

    @media (max-width: 760px) {
      body {
        padding: 18px 12px 42px;
      }

      .top-note {
        display: none;
      }

      .title {
        font-size: clamp(34px, 11vw, 54px);
        letter-spacing: .08em;
        margin-bottom: 20px;
      }

      header {
        border-radius: 24px;
      }

      .main-clock {
        font-size: clamp(46px, 15vw, 66px);
        letter-spacing: -0.075em;
      }

      .controls {
        grid-template-columns: 1fr auto;
        border-radius: 20px;
      }

      .controls button {
        width: 54px;
        padding: 0;
        font-size: 0;
      }

      .controls button::before {
        content: "+";
        font-size: 26px;
        line-height: 1;
      }

      .map-panel {
        min-height: 210px;
        margin-bottom: 18px;
      }

      .world-map {
        width: 140%;
        margin-left: -20%;
      }

      .map-axis span:nth-child(even) {
        display: none;
      }

      .grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .clock-card {
        min-height: 150px;
        border-radius: 18px;
      }

      .time {
        font-size: clamp(32px, 12vw, 44px);
      }
    }

    @media (max-width: 420px) {
      .title {
        white-space: normal;
      }

      .hero-label {
        font-size: 12px;
      }

      .format-line {
        font-size: 13px;
      }

      input {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <div class="app-mark" aria-hidden="true">WC</div>
      <div class="top-note">Global city search • Live local time</div>
      <button class="install-btn" id="installBtn" hidden>Install App</button>
    </div>

    <div class="title">World Clock</div>

    <header>
      <div class="hero-label">
        <div class="hero-label-left">
          <span class="status-dot" aria-hidden="true"></span>
          <span>Local Time</span>
        </div>
        <span class="hero-pill">UTC</span>
      </div>
      <div class="main-clock" id="mainClock">00:00:00</div>
      <div class="date-line" id="localDate">Loading date</div>
      <div class="hero-rule"></div>
      <div class="subline" id="deviceLine">Loading location</div>
      <div class="format-line">24-hour format • Live local time</div>
    </header>

    <section class="controls">
      <input id="searchInput" placeholder="Type country or city, for example KSA or Jeddah" autocomplete="off" />
      <button id="addBtn">Add Clock</button>

    };

    function enrichClockLocation(clock) {
      const key = `${normalise(clock.city)}|${normalise(clock.country)}`;
      const coords = knownCoordinates[key];
      return coords ? { ...clock, ...coords } : clock;
    }

    const countryCodeMap = {
      "australia": "AU",
      "canada": "CA",
      "china": "CN",
      "france": "FR",
      "germany": "DE",
      "india": "IN",
      "japan": "JP",
      "malaysia": "MY",
      "pakistan": "PK",
      "qatar": "QA",
      "russia": "RU",
      "saudi arabia": "SA",
      "singapore": "SG",
      "south africa": "ZA",
      "united arab emirates": "AE",
      "united kingdom": "GB",
      "great britain": "GB",
      "united states": "US",
      "united states of america": "US",
      "usa": "US"
    };

    function countryToFlag(country) {
      const code = countryCodeMap[normalise(country || "")];
      if (!code) return "";
      return code
        .toUpperCase()
        .replace(/./g, char => String.fromCodePoint(127397 + char.charCodeAt(0)));
    }

    function projectLonLat(lon, lat) {
      return {
        x: ((Number(lon) + 180) / 360) * 1000,
        y: ((90 - Number(lat)) / 180) * 430
      };
    }

    function renderMapMarkers() {
      const layer = document.getElementById("mapMarkers");
      if (!layer) return;

      layer.innerHTML = clocks
        .filter(clock => Number.isFinite(Number(clock.lat)) && Number.isFinite(Number(clock.lon)))
        .slice(0, MAX_CLOCKS)
        .map(clock => {
          const point = projectLonLat(clock.lon, clock.lat);
          return `<circle class="map-marker" cx="${point.x.toFixed(1)}" cy="${point.y.toFixed(1)}" r="5"><title>${escapeHTML(clock.city)}</title></circle>`;
        })
        .join("");
    }

    function loadClocks() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        return Array.isArray(saved) ? saved : [];
      } catch {
        return [];
      }
    }

    function saveClocks() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(clocks));
    }

    function normalise(value) {
      return String(value)
        .trim()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[.’']/g, "")
        .replace(/\s+/g, " ");
    }

    function titleCase(value) {
      return String(value)
        .replace(/_/g, " ")
        .replace(/\w\S*/g, word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase());
    }

    function getCountryFromAddress(address) {
      if (!address) return "";
      return address.country || address.state || address.region || "";
    }

    function getCityFromAddress(address, fallback) {
      if (!address) return fallback;
      return address.city || address.town || address.village || address.municipality || address.county || fallback;
    }

    async function findClock(query) {
      const raw = String(query).trim();
      const typed = normalise(raw);
      if (!typed) return null;

      if (countryShortForms[typed]) {
        return resolveKnownCapital(countryShortForms[typed]);
      }

      if (countryCapitalHints[typed]) {
        return resolveKnownCapital(countryCapitalHints[typed]);
      }

      if (cityOverrides[typed]) {
        return enrichClockLocation(cityOverrides[typed]);
      }

      const countryResult = await tryResolveCountry(raw);
      if (countryResult) return countryResult;

      const cityResult = await geocodeCity(raw);
      if (cityResult) return cityResult;

      return null;
    }

    async function resolveKnownCapital(item) {
      const result = await geocodeCity(item.query);
      if (result) {
        result.city = item.capital;
        result.country = item.label;
        return result;
      }

      return null;
    }

    async function tryResolveCountry(raw) {
      try {
        const url = `https://restcountries.com/v3.1/name/${encodeURIComponent(raw)}?fullText=true`;
        const response = await fetch(url);
        if (!response.ok) return null;

        const data = await response.json();
        if (!Array.isArray(data) || !data.length) return null;

        const country = data[0];
        const capital = country.capital && country.capital[0];
        const countryName = country.name && country.name.common;

        if (!capital || !countryName) return null;

        const result = await geocodeCity(`${capital}, ${countryName}`);
        if (!result) return null;

        result.city = capital;
        result.country = countryName;
        return result;
      } catch {
        return null;
      }
    }

    async function geocodeCity(raw) {
      try {
        message.textContent = "Searching global city database...";

        const params = new URLSearchParams({
          q: raw,
          format: "jsonv2",
          addressdetails: "1",
          limit: "1"
        });

        const url = `https://nominatim.openstreetmap.org/search?${params.toString()}`;
        const response = await fetch(url, {
          headers: {
            "Accept": "application/json"
          }
        });

        if (!response.ok) return null;

        const data = await response.json();
        if (!Array.isArray(data) || !data.length) return null;

        const place = data[0];
        const lat = Number(place.lat);
        const lon = Number(place.lon);

        if (!Number.isFinite(lat) || !Number.isFinite(lon) || typeof tzlookup !== "function") return null;

        const zone = tzlookup(lat, lon);
        const city = getCityFromAddress(place.address, raw);
        const country = getCountryFromAddress(place.address);

        return {
          city: titleCase(city),
          country: titleCase(country),
          zone,
          lat,
          lon
        };
      } catch {
        return null;
      }
    }

    function formatTime(zone) {
      return new Intl.DateTimeFormat("en-GB", {
        timeZone: zone,
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      }).format(new Date());
    }

    function formatDate(zone) {
      return new Intl.DateTimeFormat("en-GB", {
        timeZone: zone,
        weekday: "short",
        day: "2-digit",
        month: "short",
        year: "numeric"
      }).format(new Date());
    }

    function getProgressAngle(zone) {
      const now = new Date();
      const parts = new Intl.DateTimeFormat("en-GB", {
        timeZone: zone,
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      }).formatToParts(now);

      const hour = Number(parts.find(part => part.type === "hour").value);
      const minute = Number(parts.find(part => part.type === "minute").value);
      const second = Number(parts.find(part => part.type === "second").value);
      return (((hour * 3600) + (minute * 60) + second) / 86400) * 360;
    }

    async function addClock() {
      const found = await findClock(searchInput.value);

      if (!found) {
        message.textContent = "City or country not found. Try another spelling, for example KSA, UAE, USA, Jeddah, or Manchester.";
        return;
      }

      const duplicate = clocks.some(clock =>
        clock.zone === found.zone &&
        normalise(clock.city) === normalise(found.city) &&
        normalise(clock.country) === normalise(found.country)
      );

      if (duplicate) {
        message.textContent = "This clock is already added.";
        searchInput.value = "";
        return;
      }

      if (clocks.length >= MAX_CLOCKS) {
        message.textContent = `You have reached the maximum of ${MAX_CLOCKS} clocks. Remove one before adding another.`;
        return;
      }

      clocks.push(found);
      saveClocks();
      searchInput.value = "";
      message.textContent = `${found.city} added${found.country ? `, ${found.country}` : ""}.`;
      renderCards();
      tick();
    }

    function deleteClock(index) {
      clocks.splice(index, 1);
      saveClocks();
      renderCards();
      tick();
    }

    function moveClock(oldIndex, newIndex) {
      if (oldIndex === null || oldIndex === newIndex) return;
      const [clock] = clocks.splice(oldIndex, 1);
      clocks.splice(newIndex, 0, clock);
      saveClocks();
      renderCards();
      tick();
    }

    function renderCards() {
      grid.innerHTML = "";
      emptyState.style.display = clocks.length ? "none" : "block";
      renderMapMarkers();

      clocks.forEach((clock, index) => {
        const card = document.createElement("article");
        card.className = "clock-card";
        card.draggable = true;
        card.dataset.index = index;

        card.innerHTML = `
          <div class="card-top">
            <div>
              <div class="city-row"><span class="flag" aria-hidden="true">${countryToFlag(clock.country)}</span><div class="city">${escapeHTML(clock.city)}</div></div>
              <div class="country">${escapeHTML(clock.country || clock.zone)}</div>
            </div>
            <span class="utc-pill" data-utc-zone="${escapeHTML(clock.zone)}">UTC</span>
          </div>
          <div class="day-status" data-day-zone="${escapeHTML(clock.zone)}">Local time</div>
          <div class="time" data-zone="${escapeHTML(clock.zone)}"><span>00:00:00</span></div>
          <div class="date" data-date-zone="${escapeHTML(clock.zone)}">Loading</div>
          <div class="card-footer">
            <span>${escapeHTML(clock.zone)}</span>
            <button class="delete-btn" data-index="${index}" aria-label="Delete ${escapeHTML(clock.city)}">Delete</button>
          </div>
        `;

        grid.appendChild(card);
      });

      renderMapMarkers();

      document.querySelectorAll(".delete-btn").forEach(button => {
        button.addEventListener("click", event => {
          event.stopPropagation();
          deleteClock(Number(button.dataset.index));
        });
      });

      document.querySelectorAll(".clock-card").forEach(card => {
        card.addEventListener("dragstart", () => {
          draggedIndex = Number(card.dataset.index);
          card.classList.add("dragging");
        });

        card.addEventListener("dragend", () => {
          card.classList.remove("dragging");
          draggedIndex = null;
        });

        card.addEventListener("dragover", event => event.preventDefault());

        card.addEventListener("drop", event => {
          event.preventDefault();
          moveClock(draggedIndex, Number(card.dataset.index));
        });
      });
    }

    function getUTCOffsetLabel(zone) {
      try {
        const parts = new Intl.DateTimeFormat("en-GB", {
          timeZone: zone,
          timeZoneName: "shortOffset"
        }).formatToParts(new Date());
        const value = parts.find(part => part.type === "timeZoneName").value;
        return value.replace("GMT", "UTC");
      } catch {
        return "UTC";
      }
    }

    function getDayStatus(zone) {
      try {
        const hour = Number(new Intl.DateTimeFormat("en-GB", {
          timeZone: zone,
          hour: "2-digit",
          hour12: false
        }).format(new Date()));
        return hour >= 6 && hour < 18 ? "Day" : "Night";
      } catch {
        return "Local time";
      }
    }

    function getDeviceLocationLabel() {
      const zone = Intl.DateTimeFormat().resolvedOptions().timeZone || "Local Time";
      const city = zone.includes("/") ? zone.split("/").pop().replaceAll("_", " ") : zone;
      return `${titleCase(city)} • ${zone}`;
    }

    function tick() {
      const now = new Date();

      localDate.textContent = new Intl.DateTimeFormat("en-GB", {
        weekday: "long",
        day: "2-digit",
        month: "long",
        year: "numeric"
      }).format(now);

      mainClock.textContent = new Intl.DateTimeFormat("en-GB", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      }).format(now);

      deviceLine.textContent = getDeviceLocationLabel();

      document.querySelectorAll("[data-zone]").forEach(element => {
        const zone = element.dataset.zone;
        const angle = getProgressAngle(zone);
        const span = element.querySelector("span");

        element.style.setProperty("--angle", `${angle}deg`);
        span.textContent = formatTime(zone);
      });

      document.querySelectorAll("[data-date-zone]").forEach(element => {
        element.textContent = formatDate(element.dataset.dateZone);
      });

      document.querySelectorAll("[data-utc-zone]").forEach(element => {
        element.textContent = getUTCOffsetLabel(element.dataset.utcZone);
      });

      document.querySelectorAll("[data-day-zone]").forEach(element => {
        element.textContent = getDayStatus(element.dataset.dayZone);
      });
    }

    function escapeHTML(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function runTests() {
      console.assert(countryShortForms.ksa.capital === "Riyadh", "KSA should map to Riyadh.");
      console.assert(countryShortForms.uae.capital === "Abu Dhabi", "UAE should map to Abu Dhabi.");
      console.assert(countryShortForms.usa.capital === "Washington, D.C.", "USA should map to Washington, D.C.");
      console.assert(cityOverrides.jeddah.zone === "Asia/Riyadh", "Jeddah should map to Saudi Arabia timezone.");
      console.assert(typeof getProgressAngle("Europe/London") === "number", "Progress angle should be numeric.");
    }



    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js").catch(() => {
          // Service worker registration can fail locally. The app still works in the browser.
        });
      });
    }

    window.addEventListener("beforeinstallprompt", event => {
      event.preventDefault();
      deferredInstallPrompt = event;
      if (installBtn) installBtn.hidden = false;
    });

    if (installBtn) {
      installBtn.addEventListener("click", async () => {
        if (!deferredInstallPrompt) return;
        deferredInstallPrompt.prompt();
        await deferredInstallPrompt.userChoice;
        deferredInstallPrompt = null;
        installBtn.hidden = true;
      });
    }

    window.addEventListener("appinstalled", () => {
      deferredInstallPrompt = null;
      if (installBtn) installBtn.hidden = true;
    });

    addBtn.addEventListener("click", addClock);
    searchInput.addEventListener("keydown", event => {
      if (event.key === "Enter") addClock();
    });

    message.textContent = `Global city search ready. You can add up to ${MAX_CLOCKS} clocks.`;
    runTests();
    renderCards();
    tick();
    setInterval(tick, 1000);
  </script>
